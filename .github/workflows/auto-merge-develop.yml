name: CI → Auto-merge to develop

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.get-pr.outputs.pr_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Resolve PR number
        id: get-pr
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request event: number available directly
            if (context.eventName === 'pull_request') {
              core.setOutput('pr_number', String(context.payload.pull_request.number));
              return;
            }
            // push event: search for an open PR targeting develop
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'develop',
              state: 'open',
            });
            core.setOutput('pr_number', pulls[0] ? String(pulls[0].number) : '');

  merge:
    name: Auto-merge PR → develop
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ success() && needs.ci.outputs.pr_number != '' }}

    steps:
      - name: Merge PR via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number('${{ needs.ci.outputs.pr_number }}');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              merge_method: 'squash',
            });
            console.log(`PR #${pr} merged to develop ✅`);

  notify-failure:
    name: Comment failure on PR
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ failure() && needs.ci.outputs.pr_number != '' }}

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number('${{ needs.ci.outputs.pr_number }}');
            const logsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: [
                '## ❌ CI falló — merge a develop bloqueado',
                '',
                '[Ver logs completos](' + logsUrl + ')',
              ].join('\n'),
            });
