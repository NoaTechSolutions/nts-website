name: CI → Auto-merge to develop

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  ensure-pr:
    name: Ensure PR exists
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      pr_number: ${{ steps.ensure.outputs.pr_number }}

    steps:
      - name: Create or find PR
        id: ensure
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Check for existing PR
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'develop',
              state: 'open',
            });

            if (pulls.length > 0) {
              console.log(`PR #${pulls[0].number} already exists`);
              core.setOutput('pr_number', String(pulls[0].number));
              return;
            }

            // Generate title from branch name
            // feature/NOA-79-responsive-system → feat(NOA-79): responsive system
            // fix/NOA-80-broken-layout → fix(NOA-80): broken layout
            const typeRaw = branch.split('/')[0];
            const type = typeRaw === 'feature' ? 'feat' : typeRaw;
            const slug = branch.replace(/^(feature|fix)\//, '');
            const idMatch = slug.match(/^(NOA-\d+)-?/i);
            const linearId = idMatch ? idMatch[1].toUpperCase() : null;
            const desc = slug
              .replace(/^NOA-\d+-?/i, '')
              .replace(/[-_]/g, ' ')
              .trim();

            const title = linearId
              ? `${type}(${linearId}): ${desc}`
              : `${type}: ${desc}`;

            const bodyLines = ['## Auto-created PR', ''];
            if (linearId) {
              bodyLines.push(`Linear: ${linearId}`);
              bodyLines.push('');
            }
            bodyLines.push(`Branch: \`${branch}\` → \`develop\``);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: 'develop',
              title,
              body: bodyLines.join('\n'),
            });

            console.log(`PR #${pr.number} created: ${title}`);
            core.setOutput('pr_number', String(pr.number));

  ci:
    name: Lint & Build
    needs: [ensure-pr]
    if: always() && (needs.ensure-pr.result == 'success' || needs.ensure-pr.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.get-pr.outputs.pr_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Resolve PR number
        id: get-pr
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('pr_number', String(context.payload.pull_request.number));
              return;
            }
            // Use the PR from ensure-pr job
            const prFromEnsure = '${{ needs.ensure-pr.outputs.pr_number }}';
            core.setOutput('pr_number', prFromEnsure || '');

  merge:
    name: Auto-merge PR → develop
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ success() && needs.ci.outputs.pr_number != '' }}

    steps:
      - name: Merge PR via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number('${{ needs.ci.outputs.pr_number }}');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              merge_method: 'squash',
            });
            console.log(`PR #${pr} merged to develop ✅`);

  notify-failure:
    name: Comment failure on PR
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ failure() && needs.ci.outputs.pr_number != '' }}

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number('${{ needs.ci.outputs.pr_number }}');
            const logsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: [
                '## ❌ CI falló — merge a develop bloqueado',
                '',
                '[Ver logs completos](' + logsUrl + ')',
              ].join('\n'),
            });
